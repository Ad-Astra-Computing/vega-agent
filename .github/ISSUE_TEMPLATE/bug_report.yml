name: Bug report
description: Something does not work as documented.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include the command or workflow you ran, and the output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Node version, nix version, and the runner if relevant.
