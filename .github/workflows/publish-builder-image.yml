name: Publish builder image

# Build the reproducible Nix builder image and publish it to GHCR so the
# published image (and the agent + runner baked into it) tracks each release.
# Publishing is RELEASE-ONLY: a signed image always corresponds to a published
# release tag, never a branch build, so cosign verification of a release image
# cannot be satisfied by an arbitrary main/branch build. To re-publish, re-run
# this workflow's jobs on the release from the Actions UI.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing via the Actions OIDC token

jobs:
  publish:
    runs-on: ubuntu-latest
    # Defense in depth: a release event always carries its tag ref, but require
    # a tag ref explicitly so only a tagged release is ever signed and published.
    if: startsWith(github.ref, 'refs/tags/')
    # Gate publishing behind a protected environment. Configure `ghcr-publish` in
    # the repo settings with required reviewers (and, optionally, a tag
    # deployment rule) so only a release maintainer can approve a push to GHCR.
    environment: ghcr-publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          # Pin the installer itself, not just the wrapper action: the action
          # otherwise fetches the latest installer at runtime, leaving a mutable
          # dependency in the signing/publish path. Pin to a released installer
          # version (the CDN serves prebuilt artifacts by tag, not by arbitrary
          # revision).
          source-tag: v3.21.0
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build the image
        run: nix build .#builder-image --print-build-logs

      - name: Load and tag
        id: ref
        run: |
          # The version is taken from the image Nix actually built (its loaded
          # tag is buildLayeredImage's `tag = agent.version`), so the GHCR tag can
          # never disagree with the built artifact even if other version strings
          # drift. GHCR requires a lowercase path; the org is mixed-case.
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/vega-builder"
          loaded=$(docker load < result | sed -n 's/^Loaded image: //p' | head -1)
          test -n "$loaded" # fail loudly if the load output format changed
          version="${loaded##*:}"
          # The built image version must match the release tag, so a release can
          # never publish/sign a stale version or move :latest to the wrong image
          # (e.g. tagging v0.3.0 while flake.nix still says 0.2.0).
          test "${{ github.ref_name }}" = "v${version}" \
            || { echo "release tag ${{ github.ref_name }} != image v${version}; bump flake.nix" >&2; exit 1; }
          docker tag "$loaded" "${image}:${version}"
          docker tag "$loaded" "${image}:latest"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push
        id: push
        run: |
          docker push "${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.version }}"
          docker push "${{ steps.ref.outputs.image }}:latest"
          # Capture the immutable digest so cosign signs the content, not a tag.
          digest=$(docker inspect --format '{{ index .RepoDigests 0 }}' \
            "${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.version }}")
          echo "ref=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign (keyless)
        run: cosign sign --yes "${{ steps.push.outputs.ref }}"
