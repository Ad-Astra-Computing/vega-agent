# Reusable reproducer workflow (trust-model layer 5). Given a build's provenance,
# it rebuilds the same derivation on a fresh GitHub runner under this repo's OIDC
# identity and attests the result to Vega. Run it from a repo DISTINCT from the
# original attester so the attestation counts as an independent tenant.
#
# Trigger it manually (workflow_dispatch) or call it from another workflow
# (workflow_call). For macOS reproduction set `runner: macos-latest`.
name: Reproduce

on:
  workflow_dispatch:
    inputs:
      flake_ref:
        description: "Flake reference, e.g. github:owner/repo"
        required: true
      attr:
        description: "Attribute, e.g. packages.x86_64-linux.hello"
        required: true
      rev:
        description: "Locked commit revision to build at"
        required: true
      expect_store_path:
        description: "Expected output store path (optional, for a divergence report)"
        required: false
        default: ""
      expect_narhash:
        description: "Expected narHash, sha256:... (optional)"
        required: false
        default: ""
      runner:
        description: "Runner to reproduce on"
        required: false
        default: "ubuntu-latest"
        type: choice
        options: ["ubuntu-latest", "macos-latest"]
  workflow_call:
    inputs:
      flake_ref: { required: true, type: string }
      attr: { required: true, type: string }
      rev: { required: true, type: string }
      expect_store_path: { required: false, type: string, default: "" }
      expect_narhash: { required: false, type: string, default: "" }
      runner: { required: false, type: string, default: "ubuntu-latest" }

permissions:
  id-token: write # GitHub Actions OIDC, so Vega can verify the runner identity
  contents: read

# Serialize duplicate reproductions of the same target instead of queueing many
# identical builds; do not cancel an in-flight one.
concurrency:
  group: reproduce-${{ inputs.flake_ref }}-${{ inputs.attr }}-${{ inputs.rev }}-${{ inputs.runner }}
  cancel-in-progress: false

jobs:
  reproduce:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # no git push; do not leave the token in .git/config
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = true
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install agent deps
        run: npm ci
      - name: Reproduce and attest
        env:
          # Hardcoded, not an input: the agent must only ever send its OIDC token
          # to the real control plane. An attacker-set URL would harvest the token.
          VEGA_URL: "https://vega-cache.dev"
          VEGA_FLAKE_REF: ${{ inputs.flake_ref }}
          VEGA_ATTR: ${{ inputs.attr }}
          VEGA_REV: ${{ inputs.rev }}
          VEGA_EXPECT_STORE_PATH: ${{ inputs.expect_store_path }}
          VEGA_EXPECT_NARHASH: ${{ inputs.expect_narhash }}
        run: node_modules/.bin/tsx agent/reproduce.ts
